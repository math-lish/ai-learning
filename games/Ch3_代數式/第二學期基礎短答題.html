<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>數學温習 (Q2修正版)</title>
<script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<style>
  /* === 基礎佈局 === */
  body { 
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    background: #f0f2f5; margin: 0; padding: 8px; 
    display: flex; justify-content: center; height: 98vh; box-sizing: border-box; overflow: hidden; 
  }
  .container { 
    width: 100%; max-width: 500px; background: #fff; border-radius: 12px; 
    box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: flex; flex-direction: column; 
    height: 100%; position: relative;
  }
  
  /* === 頂部 === */
  .top-info {
    display: flex; justify-content: space-between; padding: 10px 15px; 
    font-size: 0.9em; color: #7f8c8d; background: #f8f9fa; border-bottom: 1px solid #eee; flex-shrink: 0;
  }

  /* === 答題區 === */
  #quiz-view { display: flex; flex-direction: column; height: 100%; overflow: hidden; }
  
  .quiz-content { 
    padding: 10px 15px; flex-grow: 1; overflow-y: auto; 
    display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
  }
  
  .question-text { 
    font-size: 1.3em; font-weight: bold; color: #2c3e50; 
    margin: 10px 0 15px 0; text-align: center; width: 100%; min-height: 40px;
  }
  
  .geo-image { margin-bottom: 15px; text-align: center; display: flex; justify-content: center; }
  
  .input-container { display: flex; align-items: center; justify-content: center; width: 100%; margin-bottom: 15px; }
  .virtual-input {
    flex-grow: 1; min-height: 50px; background: #fff; border: 2px solid #3498db; border-radius: 8px; 
    display: flex; align-items: center; justify-content: center; font-size: 1.6em; font-family: monospace; color: #333;
  }
  
  /* === 反饋與教學 === */
  .feedback-area { width: 95%; display: flex; flex-direction: column; align-items: center; gap: 8px; margin-bottom: 10px; }
  
  .feedback { 
    width: 100%; padding: 10px; border-radius: 6px; font-weight: bold; text-align: center; display: none; font-size: 1.1em;
  }
  .correct { background-color: #d4edda; color: #155724; }
  .incorrect { background-color: #f8d7da; color: #721c24; }
  
  .btn-teach {
    display: none; background-color: #f39c12; color: white; border: none; padding: 8px 15px; 
    border-radius: 20px; font-size: 0.95em; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    margin-top: 5px;
  }
  
  .solution-box {
    width: 100%; background: #fffcf5; border: 1px solid #fce8b2; border-radius: 8px; 
    padding: 15px; margin-top: 10px; display: none; text-align: left; color: #444; font-size: 1em; line-height: 1.6;
  }
  .solution-box h4 { margin: 0 0 8px 0; color: #d35400; border-bottom: 1px dashed #fce8b2; padding-bottom: 5px; font-size: 0.95em; }

  /* 特殊表格樣式 */
  .short-div-table { border-collapse: collapse; margin: 10px auto; font-family: 'Times New Roman', serif; font-size: 1.2em; }
  .short-div-table td { padding: 2px 10px; text-align: center; }
  .border-right { border-right: 1px solid #000; }
  .border-bottom { border-bottom: 1px solid #000; }
  
  .txt-red-factor { color: #e74c3c; font-weight: bold; }
  
  /* Q12 顏色 */
  .grid-table { border-collapse: collapse; margin: 10px auto; font-size: 1.1em; }
  .grid-table td { border: 1px solid #999; padding: 8px 12px; text-align: center; }
  .bg-blue { background-color: #e3f2fd; color: #2980b9; font-weight: bold; }
  .bg-org { background-color: #fff3e0; color: #d35400; font-weight: bold; }
  .txt-res { color: #c0392b; font-weight: bold; }
  .cell-hidden { border: none !important; background: transparent !important; }

  /* === 鍵盤區 === */
  .keypad-area { background: #f1f3f5; padding: 10px; border-top: 1px solid #ddd; flex-shrink: 0; }
  .key-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
  .key {
    background: white; border: 1px solid #ccc; border-radius: 5px; height: 45px; 
    display: flex; align-items: center; justify-content: center; font-size: 1.2em; cursor: pointer; user-select: none;
  }
  .key:active { background: #eee; transform: translateY(2px); }
  .main-btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-size: 1.1em; color: white; cursor: pointer; margin-bottom: 8px; }
  .btn-check { background-color: #2980b9; }
  .btn-next { background-color: #27ae60; display: none; }
  
  /* === 結果頁與 Modal === */
  #result-view { display: none; flex-direction: column; padding: 20px; overflow-y: auto; text-align: center; flex-grow: 1; height: 100%; }
  .history-box { margin-top: 10px; border: 1px solid #eee; border-radius: 8px; max-height: 300px; overflow-y: auto; background: #fff; }
  .history-table { width: 100%; border-collapse: collapse; font-size: 0.85em; }
  .history-table th, .history-table td { padding: 8px 4px; border-bottom: 1px solid #f1f1f1; text-align: center; vertical-align: middle;}
  .history-table th { background: #f8f9fa; position: sticky; top: 0; font-weight: bold; z-index: 5; }
  
  .btn-view-wrong { background-color: #e74c3c; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 0.85em; }
  .btn-view-correct { background-color: #27ae60; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 0.85em; }
  .btn-disabled { background-color: #ecf0f1; color: #bdc3c7; border: 1px solid #ddd; padding: 5px 8px; border-radius: 4px; cursor: default; }
  
  .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; }
  .modal-content { background: white; width: 90%; max-width: 450px; max-height: 85vh; border-radius: 12px; padding: 20px; display: flex; flex-direction: column; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
  .modal-header { font-size: 1.2em; font-weight: bold; margin-bottom: 10px; border-bottom: 1px solid #eee; padding-bottom: 10px; display: flex; justify-content: space-between; align-items: center;}
  .modal-body { overflow-y: auto; flex-grow: 1; }
  .close-modal-btn { background: none; border: none; font-size: 1.5em; cursor: pointer; color: #888; }
  
  .review-item { border-bottom: 1px solid #eee; padding: 15px 0; margin-bottom: 10px; }
  .review-q { font-weight: bold; color: #2c3e50; margin-bottom: 8px; }
  .wrong-record .review-my-ans { color: #c0392b; text-decoration: line-through; }
  .review-cor-ans { color: #27ae60; font-weight: bold; margin-top: 5px;}

</style>
</head>
<body>

<div class="container">
  <div class="top-info">
    <span id="p-text">Q 1/14</span>
    <span id="score-mini">得分: 0</span>
  </div>

  <div id="quiz-view">
    <div class="quiz-content">
      <div id="q-text" class="question-text">題目載入中...</div>
      <div id="q-image" class="geo-image" style="display:none;"></div>
      
      <div class="input-container">
        <span id="prefix" style="display:none; margin-right:5px; font-weight:bold; font-size:1.2em;">x=</span>
        <div class="virtual-input"><span id="input-val"></span></div>
        <span id="suffix" style="display:none; margin-left:5px; color:#555;"></span>
      </div>
      
      <div class="feedback-area">
        <div id="q-feedback" class="feedback"></div>
        <button id="btn-teach" class="btn-teach" onclick="toggleTeach()">💡 查看教學步驟</button>
      </div>
      
      <div id="solution-box" class="solution-box"></div>
    </div>

    <div class="keypad-area">
      <button class="main-btn btn-check" id="btn-check" onclick="checkAns()">核對答案</button>
      <button class="main-btn btn-next" id="btn-next" onclick="nextQ()">下一題</button>
      
      <div class="key-grid">
        <div class="key" onclick="kp('7')">7</div><div class="key" onclick="kp('8')">8</div><div class="key" onclick="kp('9')">9</div>
        <div class="key" style="background:#eef" onclick="kp('×')">×</div><div class="key" style="background:#eef" onclick="kp('÷')">÷</div>
        <div class="key" style="background:#eef" onclick="kp('(')">(</div><div class="key" style="background:#eef" onclick="kp(')')">)</div>
        <div class="key" onclick="kp('4')">4</div><div class="key" onclick="kp('5')">5</div><div class="key" onclick="kp('6')">6</div>
        <div class="key" style="background:#eef" onclick="kp('+')">+</div><div class="key" style="background:#eef" onclick="kp('-')">-</div>
        <div class="key" style="background:#eef" onclick="kp('^')">^</div><div class="key" style="color:#d35400" onclick="kp('x')">x</div>
        <div class="key" onclick="kp('1')">1</div><div class="key" onclick="kp('2')">2</div><div class="key" onclick="kp('3')">3</div>
        <div class="key" onclick="kp('0')">0</div>
        <div class="key" style="color:#d35400" onclick="kp('a')">a</div><div class="key" style="color:#d35400" onclick="kp('y')">y</div>
        <div class="key" style="background:#fee; color:red" onclick="del()">⌫</div>
      </div>
    </div>
  </div>

  <div id="result-view">
    <h2>練習完成</h2>
    <h1 id="final-score" style="font-size:3em; margin:10px 0;"></h1>
    <div style="width:100%; margin-bottom:10px;">
      <button class="main-btn" style="background:#95a5a6" onclick="initGame('all')">全部重做</button>
      <button class="main-btn" style="background:#e74c3c" id="btn-retry-wrong" onclick="initGame('wrong')">重做錯題</button>
    </div>
    <div class="history-box">
      <table class="history-table">
        <thead><tr><th>次數</th><th>時間</th><th>分數</th><th>錯題</th><th>正題</th></tr></thead>
        <tbody id="history-body"></tbody>
      </table>
    </div>
  </div>
</div>

<div id="detail-modal" class="modal-overlay">
  <div class="modal-content">
    <div class="modal-header">
      <span id="modal-title">詳情</span>
      <button class="close-modal-btn" onclick="closeModal()">×</button>
    </div>
    <div id="modal-body-content" class="modal-body"></div>
    <button class="main-btn" style="margin-top:10px; background:#7f8c8d;" onclick="closeModal()">關閉</button>
  </div>
</div>

<script>
try {
  var qList = [], currIdx = 0, currInput = "", wrongIds = [], sessionLog = [];
  
  function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
  function gcd(a, b) { return b == 0 ? a : gcd(b, a % b); }
  function getLCM(a, b) { return (a * b) / gcd(a, b); }
  function fmtPoly(c, v) { if(c===1)return v; if(c===-1)return "-"+v; return c+v; }
  function fmtPolyWithSign(c, v) { 
      if(c===0) return "";
      let s = (c>0) ? "+" : "-";
      let val = Math.abs(c);
      if(val===1) val="";
      return `${s} ${val}${v}`;
  }

  // ============ SVG 生成 ============
  function getCubeSVG(s, highlight) {
    let fill = highlight ? "#ffe082" : "none";
    let base = `<rect x="40" y="60" width="80" height="80" fill="${fill}" stroke="black" stroke-width="2"/><polyline points="40,60 70,30 150,30 150,110 120,140" fill="none" stroke="black" stroke-width="2"/><line x1="150" y1="30" x2="120" y2="60" stroke="black" stroke-width="2"/>`;
    if(highlight) {
       return `<svg width="150" height="150" viewBox="0 0 200 170">${base}<line x1="120" y1="60" x2="120" y2="140" stroke="red" stroke-width="4"/><text x="130" y="100" font-size="16" fill="red" font-weight="bold">高</text><text x="80" y="100" font-size="14" fill="#d35400">底面積</text></svg>`;
    }
    return `<svg width="150" height="150" viewBox="0 0 200 170">${base}<text x="80" y="158" font-size="16" text-anchor="middle" fill="#333">${s}cm</text><text x="125" y="100" font-size="16" dominant-baseline="middle" fill="#333">${s}cm</text><text x="110" y="45" font-size="16" text-anchor="middle" fill="#333">${s}cm</text></svg>`;
  }

  function getCuboidSVG(l, w, h, highlight) {
    if(highlight) {
        return `<svg width="180" height="140" viewBox="0 0 240 180">
          <polygon points="50,60 90,30 190,30 150,60" fill="#ffe082" stroke="none"/>
          <rect x="50" y="60" width="100" height="70" fill="none" stroke="black" stroke-width="2"/>
          <polyline points="50,60 90,30 190,30 150,60" fill="none" stroke="black" stroke-width="2"/>
          <polyline points="150,60 190,30 190,100 150,130" fill="none" stroke="black" stroke-width="2"/>
          <line x1="190" y1="30" x2="190" y2="100" stroke="red" stroke-width="4"/>
          <text x="110" y="50" font-size="14" fill="#d35400">底面積</text><text x="200" y="70" font-size="16" fill="red">高</text>
        </svg>`;
    }
    return `<svg width="180" height="140" viewBox="0 0 240 180">
      <rect x="50" y="60" width="100" height="70" fill="none" stroke="black" stroke-width="2"/>
      <polyline points="50,60 90,30 190,30 150,60" fill="none" stroke="black" stroke-width="2"/>
      <polyline points="150,60 190,30 190,100 150,130" fill="none" stroke="black" stroke-width="2"/>
      <text x="100" y="155" font-size="16" text-anchor="middle" fill="#333">${l}cm</text>
      <text x="35" y="100" font-size="16" text-anchor="middle" fill="#333">${h}cm</text>
      <text x="60" y="40" font-size="16" text-anchor="middle" fill="#333">${w}cm</text>
    </svg>`;
  }

  function getPrismSVG(b, h, len, highlight) {
    let p1={x:40, y:120}; let p2={x:140, y:120}; let p3={x:90, y:40};
    let dX=40, dY=-20;
    let p4={x:p1.x+dX, y:p1.y+dY}; let p5={x:p2.x+dX, y:p2.y+dY}; let p6={x:p3.x+dX, y:p3.y+dY};
    let hBaseX = p3.x; let hBaseY = p1.y;

    if(highlight) {
        return `<svg width="200" height="150" viewBox="0 0 240 150">
          <polygon points="${p1.x},${p1.y} ${p2.x},${p2.y} ${p3.x},${p3.y}" fill="#ffe082" stroke="none"/>
          <line x1="${p1.x}" y1="${p1.y}" x2="${p4.x}" y2="${p4.y}" stroke="#555" stroke-dasharray="4,4"/>
          <line x1="${p4.x}" y1="${p4.y}" x2="${p5.x}" y2="${p5.y}" stroke="#555" stroke-dasharray="4,4"/>
          <line x1="${p4.x}" y1="${p4.y}" x2="${p6.x}" y2="${p6.y}" stroke="#555" stroke-dasharray="4,4"/>
          <polygon points="${p1.x},${p1.y} ${p2.x},${p2.y} ${p3.x},${p3.y}" fill="none" stroke="black" stroke-width="2"/>
          <line x1="${p1.x}" y1="${p1.y}" x2="${p4.x}" y2="${p4.y}" stroke="black" stroke-width="2" stroke-dasharray="4,4"/>
          <line x1="${p2.x}" y1="${p2.y}" x2="${p5.x}" y2="${p5.y}" stroke="black" stroke-width="2"/>
          <line x1="${p3.x}" y1="${p3.y}" x2="${p6.x}" y2="${p6.y}" stroke="black" stroke-width="2"/>
          <line x1="${p5.x}" y1="${p5.y}" x2="${p6.x}" y2="${p6.y}" stroke="black" stroke-width="2"/>
          <line x1="${p3.x}" y1="${p3.y}" x2="${p6.x}" y2="${p6.y}" stroke="red" stroke-width="4"/> 
          <text x="90" y="100" font-size="14" fill="#d35400" text-anchor="middle">底面積</text>
          <text x="${(p3.x+p6.x)/2}" y="${(p3.y+p6.y)/2 - 10}" font-size="16" fill="red" text-anchor="middle">高</text>
        </svg>`;
    }
    return `<svg width="200" height="150" viewBox="0 0 240 150">
      <line x1="${p1.x}" y1="${p1.y}" x2="${p4.x}" y2="${p4.y}" stroke="#999" stroke-width="1.5" stroke-dasharray="5,3"/>
      <line x1="${p4.x}" y1="${p4.y}" x2="${p5.x}" y2="${p5.y}" stroke="#999" stroke-width="1.5" stroke-dasharray="5,3"/>
      <line x1="${p4.x}" y1="${p4.y}" x2="${p6.x}" y2="${p6.y}" stroke="#999" stroke-width="1.5" stroke-dasharray="5,3"/>
      <line x1="${p3.x}" y1="${p3.y}" x2="${hBaseX}" y2="${hBaseY}" stroke="#555" stroke-dasharray="4,4"/>
      <polyline points="${hBaseX},${hBaseY} ${hBaseX+8},${hBaseY} ${hBaseX+8},${hBaseY-8}" fill="none" stroke="#555"/>
      <polygon points="${p1.x},${p1.y} ${p2.x},${p2.y} ${p3.x},${p3.y}" fill="none" stroke="black" stroke-width="2"/>
      <line x1="${p2.x}" y1="${p2.y}" x2="${p5.x}" y2="${p5.y}" stroke="black" stroke-width="2"/>
      <line x1="${p3.x}" y1="${p3.y}" x2="${p6.x}" y2="${p6.y}" stroke="black" stroke-width="2"/>
      <line x1="${p5.x}" y1="${p5.y}" x2="${p6.x}" y2="${p6.y}" stroke="black" stroke-width="2"/>
      <text x="${p3.x+5}" y="${(p3.y+hBaseY)/2 + 5}" font-size="16" fill="#333">${h}cm</text>
      <text x="${(p1.x+p2.x)/2}" y="${p1.y+20}" font-size="16" text-anchor="middle" fill="#333">${b}cm</text>
      <text x="${(p3.x+p6.x)/2}" y="${(p3.y+p6.y)/2 - 8}" font-size="16" text-anchor="middle" fill="#333">${len}cm</text>
    </svg>`;
  }

  function getCoordSVG(x, y, quad) {
      let colors = { "I": "#fff", "II": "#fff", "III": "#fff", "IV": "#fff" }; colors[quad] = "#fffacd";
      let cx = 100 + x * 15; let cy = 100 - y * 15;
      return `<svg width="200" height="200" viewBox="0 0 200 200" style="border:1px solid #ccc; background:#fff;">
        <rect x="100" y="0" width="100" height="100" fill="${colors['I']}" /><rect x="0" y="0" width="100" height="100" fill="${colors['II']}" /><rect x="0" y="100" width="100" height="100" fill="${colors['III']}" /><rect x="100" y="100" width="100" height="100" fill="${colors['IV']}" />
        <line x1="100" y1="0" x2="100" y2="200" stroke="black" stroke-width="1.5"/><line x1="0" y1="100" x2="200" y2="100" stroke="black" stroke-width="1.5"/>
        <text x="190" y="95" font-size="12">x</text><text x="105" y="10" font-size="12">y</text><text x="180" y="20" font-size="20" fill="#ddd" font-weight="bold">I</text><text x="20" y="20" font-size="20" fill="#ddd" font-weight="bold">II</text><text x="20" y="180" font-size="20" fill="#ddd" font-weight="bold">III</text><text x="180" y="180" font-size="20" fill="#ddd" font-weight="bold">IV</text>
        <circle cx="${cx}" cy="${cy}" r="4" fill="red" /><text x="${cx+5}" y="${cy-5}" font-size="12" fill="red">(${x},${y})</text>
      </svg>`;
  }

  // ============ 題目生成 ============
  function makeQ(id) {
      var txt="", ans=[], displayAns="", imgSVG="", steps="";
      
      if(id===1) {
        var nums = [12, 18, 20, 36, 45, 50, 63, 75, 98]; var n = nums[rand(0, nums.length-1)];
        var divs=[], rems=[n], temp=n;
        while(true){ let f=false; for(let i=2; i*i<=temp; i++){ if(temp%i===0){ divs.push(i); temp/=i; rems.push(temp); f=true; break; } } if(!f) break; }
        var factors={}; [...divs, temp].forEach(f=>factors[f]=(factors[f]||0)+1);
        var ansStr = Object.keys(factors).map(f=>factors[f]>1?`${f}^${factors[f]}`:f).join(" \\times ");
        var rawAns = Object.keys(factors).map(f=>factors[f]>1?`${f}^${factors[f]}`:f).join("x");
        var expandedStr = [...divs, temp].join(" \\times ");
        displayAns = ansStr; 
        txt = `1. 寫出 \\( ${n} \\) 的質因數連乘式 (指數記數法)。`; ans = [rawAns];
        let tbl = `<table class="short-div-table">`;
        for(let k=0; k<divs.length; k++) tbl += `<tr><td class="border-right txt-red-factor">${divs[k]}</td><td class="border-bottom">${rems[k]}</td></tr>`;
        tbl += `<tr><td></td><td class="txt-red-factor">${temp}</td></tr></table>`;
        steps = `${tbl}<div style="text-align:center; margin-top:5px;">\\( ${n} = ${expandedStr} = ${ansStr} \\)</div>`;
      }
      else if(id===2) {
        var n1=rand(6,12)*2, n2=rand(6,12)*3; var isHCF = rand(0,1)==0;
        var a=n1, b=n2, common=[]; var rows=[`${a} &nbsp; ${b}`];
        while(true){ let d=1; for(let k of [2,3,5,7]){if(a%k==0&&b%k==0){d=k;break;}} if(d===1)break; common.push(d); a/=d;b/=d; rows.push(`${a} &nbsp; ${b}`); }
        if(common.length === 0) { common = [1]; rows.push(`${a} &nbsp; ${b}`); }
        let tbl = `<table class="short-div-table">`;
        for(let i=0; i<common.length; i++) tbl+=`<tr><td class="border-right txt-red-factor">${common[i]}</td><td class="border-bottom">${rows[i]}</td></tr>`;
        let lastCls = isHCF ? "" : "txt-red-factor";
        tbl += `<tr><td></td><td class="${lastCls}">${rows[rows.length-1]}</td></tr></table>`;
        
        // 修正: 將 join("\\times") 改為 join(" x ") 以符合使用者要求
        if(isHCF) { 
            let v=gcd(n1,n2); txt=`2. 求 \\( ${n1} \\) 和 \\( ${n2} \\) 的 H.C.F.。`; ans=[v.toString()]; 
            displayAns=v; 
            steps=`${tbl}<div style="margin-top:5px; text-align:left;">H.C.F. = ${common.join(" x ")} = ${v}</div>`; 
        }
        else { 
            let v=getLCM(n1,n2); txt=`2. 求 \\( ${n1} \\) 和 \\( ${n2} \\) 的 L.C.M.。`; ans=[v.toString()]; 
            displayAns=v; 
            steps=`${tbl}<div style="margin-top:5px; text-align:left;">L.C.M. = ${[...common,a,b].join(" x ")} = ${v}</div>`; 
        }
      }
      else if(id===3) {
        var a=rand(2,9), b=rand(2,9), type=rand(0,1); var op=type==0?"+":"-"; var res=type==0?-a-b:-a+b; var s2=type==0?`-${a}-${b}`:`-${a}+${b}`;
        txt=`3. 計算 \\( -${a} ${op} (-${b}) \\)。`; ans=[res.toString()]; displayAns=res;
        steps=`\\( \\begin{align*} & -${a} ${op} (-${b}) \\\\ = & ${s2} \\\\ = & ${res} \\end{align*} \\)`;
      }
      else if(id===4) {
        var a=rand(2,9), b=rand(2,9), isPos=rand(0,1)==0;
        if(isPos) { txt=`4. 計算 \\( ${a}(- ${b}) \\)。`; ans=[(-a*b).toString()]; displayAns=-a*b; steps=`<div>正負得負:</div><div>\\( ${a}(- ${b}) = ${a} \\times (-${b}) = -${a*b} \\)</div>`; }
        else { txt=`4. 計算 \\( (-${a})(-${b}) \\)。`; ans=[(a*b).toString()]; displayAns=a*b; steps=`<div>負負得正:</div><div>\\( (-${a})(-${b}) = ${a} \\times ${b} = ${a*b} \\)</div>`; }
      }
      else if(id===5) {
        var a=rand(2,9), b=rand(2,9), t=rand(1,4);
        if(t==1){ txt=`5. 以代數式表示「由 \\( x \\) 減去 \\( ${a} \\) 之差除以 \\( ${b} \\)」。`; ans=[`(x-${a})/${b}`, `(x-${a})÷${b}`]; displayAns=`\\frac{x-${a}}{${b}}`; steps=`1. 先寫出差：\\( (x-${a}) \\)<br>2. 再除以 ${b}：\\( (x-${a}) \\div ${b} \\)<br>3. 寫成分數形式：\\( \\frac{x-${a}}{${b}} \\)`; }
        else if(t==2){ txt=`5. 以代數式表示「\\( x \\) 與 \\( ${a} \\) 之和乘以 \\( ${b} \\)」。`; ans=[`${b}(x+${a})`]; displayAns=`${b}(x+${a})`; steps=`1. 先寫出和：\\( (x+${a}) \\)<br>2. 再乘以 ${b}：\\( ${b}(x+${a}) \\)`; }
        else if(t==3){ txt=`5. 以代數式表示「\\( x \\) 乘以 \\( ${a} \\) 之後減去 \\( ${b} \\)」。`; ans=[`${a}x-${b}`]; displayAns=`${a}x-${b}`; steps=`1. 先寫乘積：\\( ${a}x \\)<br>2. 再減去 ${b}：\\( ${a}x - ${b} \\)`; }
        else{ txt=`5. 以代數式表示「\\( x \\) 除以 \\( ${a} \\) 之後加上 \\( ${b} \\)」。`; ans=[`x/${a}+${b}`, `x÷${a}+${b}`]; displayAns=`\\frac{x}{${a}} + ${b}`; steps=`1. 先寫除法：\\( x \\div ${a} \\)<br>2. 寫成分數：\\( \\frac{x}{${a}} \\)<br>3. 再加上 ${b}：\\( \\frac{x}{${a}} + ${b} \\)`; }
      }
      else if(id===6) {
        var a=rand(2,9), b=rand(1,9);
        if(rand(0,1)==0) { txt=`6. 解方程： \\( x - ${a} = ${b} \\)。`; ans=[(b+a).toString()]; displayAns=b+a; steps=`\\begin{align*} x - ${a} &= ${b} \\\\ x &= ${b} + ${a} \\\\ x &= ${b+a} \\end{align*}`; }
        else { txt=`6. 解方程： \\( x + ${a} = ${b} \\)。`; ans=[(b-a).toString()]; displayAns=b-a; steps=`\\begin{align*} x + ${a} &= ${b} \\\\ x &= ${b} - ${a} \\\\ x &= ${b-a} \\end{align*}`; }
      }
      else if(id===7) {
        var k=rand(2,5), x=rand(2,6);
        if(rand(0,1)==0) { txt=`7. 解方程： \\( ${k}x = ${k*x} \\)。`; ans=[x.toString()]; displayAns=x; steps=`\\begin{align*} ${k}x &= ${k*x} \\\\ x &= ${k*x} \\div ${k} \\\\ x &= ${x} \\end{align*}`; }
        else { txt=`7. 解方程： \\( \\frac{x}{${k}} = ${x} \\)。`; ans=[(x*k).toString()]; displayAns=x*k; steps=`\\begin{align*} \\frac{x}{${k}} &= ${x} \\\\ x &= ${x} \\times ${k} \\\\ x &= ${x*k} \\end{align*}`; }
      }
      else if(id===8) {
        var t=rand(1,3);
        if(t==1) { 
            var s=rand(3,6); 
            txt=`8. 求圖中正方體的體積。`; 
            imgSVG=getCubeSVG(s, false); 
            ans=[(s*s*s).toString()]; 
            displayAns=`${s*s*s} \\text{ cm}^3`;
            let expSVG = getCubeSVG(s, true);
            steps=`<div>公式: 柱體體積 = 底面積 x 高</div>
                   <div style="display:flex;justify-content:center;margin:10px;">${expSVG}</div>
                   <div>體積 = \\( ${s} \\times ${s} \\times ${s} = ${s*s*s} \\text{ cm}^3 \\)</div>`; 
        }
        else if(t==2) { 
            var l=rand(2,5),w=rand(2,5),h=rand(4,8); 
            txt=`8. 求圖中長方體的體積。`; 
            imgSVG=getCuboidSVG(l,w,h, false); 
            ans=[(l*w*h).toString()]; 
            displayAns=`${l*w*h} \\text{ cm}^3`;
            let expSVG = getCuboidSVG(l,w,h, true);
            steps=`<div>公式: 柱體體積 = 底面積 x 高</div>
                   <div style="display:flex;justify-content:center;margin:10px;">${expSVG}</div>
                   <div>體積 = \\( ${l} \\times ${w} \\times ${h} = ${l*w*h} \\text{ cm}^3 \\)</div>`; 
        }
        else { 
            var b=rand(2,4)*2,th=rand(3,6),len=rand(5,10); 
            txt=`8. 求圖中三角柱體的體積。`; 
            imgSVG=getPrismSVG(b,th,len, false); 
            ans=[(b*th/2*len).toString()]; 
            displayAns=`${b*th/2*len} \\text{ cm}^3`; 
            let expSVG = getPrismSVG(b,th,len, true);
            steps=`<div>公式: 柱體體積 = 底面積 x 高</div>
                   <div style="display:flex;justify-content:center;margin:10px;">${expSVG}</div>
                   <div>底面積 = \\( \\frac{${b} \\times ${th}}{2} = ${b*th/2} \\text{ cm}^2 \\)</div>
                   <div>體積 = \\( ${b*th/2} \\times ${len} = ${b*th/2*len} \\text{ cm}^3 \\)</div>`; 
        }
      }
      else if(id===9) {
         var b=rand(2,9), c=rand(2,9), sb=Math.random()>.5?"+":"-", sc=Math.random()>.5?"+":"-";
         var terms=[`+x^2`,`${sb}${b}x`,`${sc}${c}`];
         for(var i=terms.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));[terms[i],terms[j]]=[terms[j],terms[i]];}
         var poly=terms.join("").replace(/^\+/,""); txt=`9. 按 \\( x \\) 的降冪次序排列： \\( ${poly} \\)。`; 
         var std=`x^2${sb}${b}x${sc}${c}`; ans=[std]; displayAns=std; 
         steps=`1. 比較次方：<br> - \\( x^{\\color{red}{2}} \\) (2次)<br> - \\( ${b}x^{\\color{red}{1}} \\) (1次)<br> - \\( ${c}x^{\\color{red}{0}} \\) (0次/常數)<br>2. 排列：\\( x^{\\color{red}{2}} ${sb} ${b}x^{\\color{red}{1}} ${sc} ${c} \\)`;
      }
      else if(id===10) {
         var co=rand(2,9), c=rand(2,9), t=rand(1,3), poly=`${co}x^2 - x + ${c}`;
         if(t==1){ txt=`10. 寫出多項式 \\( ${poly} \\) 中 \\( x^2 \\) 的係數。`; ans=[co.toString()]; displayAns=co; steps=`1. 題目：\\( ${poly} \\)<br>2. 著燈：\\( \\bbox[yellow]{${co}}x^2 - x + ${c} \\)<br>3. 答案：${co}`; }
         else if(t==2){ txt=`10. 寫出多項式 \\( ${poly} \\) 中 \\( x \\) 的係數。`; ans=["-1"]; displayAns="-1"; steps=`1. 題目：\\( ${poly} \\)<br>2. 著燈：\\( ${co}x^2 \\bbox[yellow]{- 1}x + ${c} \\) (\\(-x\\)即\\(-1x\\))<br>3. 答案：-1`; }
         else{ txt=`10. 寫出多項式 \\( ${poly} \\) 中的常數項。`; ans=[c.toString()]; displayAns=c; steps=`1. 題目：\\( ${poly} \\)<br>2. 著燈：\\( ${co}x^2 - x \\bbox[yellow]{+ ${c}} \\)<br>3. 答案：${c}`; }
      }
      else if(id===11) {
         var a=rand(2,5)*(Math.random()>.5?1:-1), b=rand(2,5)*(Math.random()>.5?1:-1); 
         if(a>0 && b<0) b=Math.abs(b); else if(a<0 && b>0) b=-Math.abs(b);
         if(rand(0,1)==0) { 
             var polyStr = fmtPoly(a,"x") + " - 4 " + fmtPolyWithSign(-b,"x");
             txt=`11. 化簡： \\( ${polyStr} \\)。`; 
             var diff=a-b; ans=[`${diff}x-4`]; displayAns=`${diff}x-4`; 
             steps=`\\begin{align*} & ${polyStr} \\\\ = & ${fmtPoly(a,"x")} ${fmtPolyWithSign(-b,"x")} - 4 \\\\ = & ${diff}x - 4 \\end{align*}`; 
         }
         else { 
             var c=rand(2,5)*(Math.random()>.5?1:-1);
             if(a>0 && c>0) c=-c;
             var polyStr = `x^2 ${fmtPolyWithSign(c,"x")} ${fmtPolyWithSign(a,"x^2")}`;
             txt=`11. 化簡： \\( ${polyStr} \\)。`; 
             var sum=1+a; ans=[`${sum}x^2${fmtPolyWithSign(c,"x")}`]; displayAns=`${sum}x^2${fmtPolyWithSign(c,"x")}`; 
             steps=`\\begin{align*} & ${polyStr} \\\\ = & 1x^2 ${fmtPolyWithSign(a,"x^2")} ${fmtPolyWithSign(c,"x")} \\\\ = & ${sum}x^2 ${fmtPolyWithSign(c,"x")} \\end{align*}`; 
         }
      }
      
      else if(id===12) {
         var av=rand(2,4), isAdd=rand(0,1)==0;
         if(isAdd) { 
             txt=`12. 展開： \\( ${av}(x+2) \\)。`; 
             ans=[`${av}x+${av*2}`]; displayAns=`${av}x+${av*2}`; 
             steps=`<table class="grid-table">
               <tr><td class="cell-hidden"></td><td class="bg-org">\\(${av}\\)</td></tr>
               <tr><td class="bg-blue">\\(x\\)</td><td class="txt-res">\\(${av}x\\)</td></tr>
               <tr><td class="bg-blue">\\(+2\\)</td><td class="txt-res">\\(+${av*2}\\)</td></tr>
             </table> 
             \\( ${av}(x+2) = ${av}x + ${av*2} \\)`; 
         }
         else { 
             txt=`12. 展開： \\( x(x-${av}) \\)。`; 
             ans=[`x^2-${av}x`]; displayAns=`x^2-${av}x`; 
             steps=`<table class="grid-table">
               <tr><td class="cell-hidden"></td><td class="bg-org">\\(x\\)</td></tr>
               <tr><td class="bg-blue">\\(x\\)</td><td class="txt-res">\\(x^2\\)</td></tr>
               <tr><td class="bg-blue">\\(-${av}\\)</td><td class="txt-res">\\(-${av}x\\)</td></tr>
             </table> 
             \\( x(x-${av}) = x^2 - ${av}x \\)`; 
         }
      }
      
      else if(id===13) { var x=rand(-9,9), y=rand(-9,9); 
         if(rand(0,1)==0) { txt=`13. 寫出坐標 \\( (${x}, ${y}) \\) 的 y 坐標。`; ans=[y.toString()]; displayAns=y; steps=`<div>坐標 = (x, y)</div><div>(${x}, <span style="color:blue;font-weight:bold">${y}</span>)</div><div>y坐標 = ${y}</div>`; }
         else { txt=`13. 寫出坐標 \\( (${x}, ${y}) \\) 的 x 坐標。`; ans=[x.toString()]; displayAns=x; steps=`<div>坐標 = (x, y)</div><div>(<span style="color:blue;font-weight:bold">${x}</span>, ${y})</div><div>x坐標 = ${x}</div>`; }
      }
      else if(id===14) { 
         var q=rand(1,4), x=(q==1||q==4)?2:-2, y=(q==1||q==2)?3:-3, qStr=["","I","II","III","IV"][q];
         txt=`14. 求坐標 \\( (${x}, ${y}) \\) 的象限。<br><span style="font-size:0.8em; color:#666;">(選項: I, II, III, IV)</span>`; ans=[q.toString(), qStr]; displayAns=qStr;
         steps=`<div style="display:flex;justify-content:center">${getCoordSVG(x,y,qStr)}</div>`;
      }
      return {id:id, txt:txt, ans:ans, displayAns:displayAns, img:imgSVG, correct:false, myAns:"", steps:steps};
  }

  function el(id) { return document.getElementById(id); }
  function showQ() {
    var q=qList[currIdx]; el('q-text').innerHTML=q.txt; el('p-text').innerText="Q "+(currIdx+1)+"/"+qList.length;
    var im=el('q-image'); if(q.img){im.innerHTML=q.img;im.style.display='flex';}else{im.style.display='none';}
    if(window.MathJax)MathJax.typesetPromise([el('q-text')]);
    el('input-val').innerText=""; currInput="";
    el('prefix').style.display=(q.id==6||q.id==7)?"inline":"none";
    el('suffix').style.display=(q.id==8)?"inline":"none"; if(q.id==8)el('suffix').innerText="cm³";
    el('q-feedback').style.display='none'; el('btn-teach').style.display='none'; el('solution-box').style.display='none';
    el('btn-check').style.display='block'; el('btn-next').style.display='none';
  }
  function toggleTeach() { var q=qList[currIdx]; var b=el('solution-box'); b.innerHTML="<h4>💡 解題步驟</h4>"+q.steps; b.style.display='block'; el('btn-teach').style.display='none'; if(window.MathJax)MathJax.typesetPromise([b]); }
  function nextQ() { currIdx++; if(currIdx<qList.length)showQ(); else showResult(); }
  function showResult() {
    el('quiz-view').style.display='none'; el('result-view').style.display='flex';
    var sc=0; wrongIds=[]; qList.forEach(q=>{if(q.correct)sc++;else wrongIds.push(q.id);});
    el('final-score').innerText=sc+"/"+qList.length;
    el('btn-retry-wrong').style.display=(sc===qList.length)?'none':'inline-block';
    var d=new Date(); var ds=(d.getMonth()+1)+"/"+d.getDate(); var ts=d.getHours().toString().padStart(2,'0')+":"+d.getMinutes().toString().padStart(2,'0');
    sessionLog.push({n:sessionLog.length+1,d:ds,t:ts,s:sc+"/"+qList.length,details:JSON.parse(JSON.stringify(qList))});
    renderHistory();
  }
  function renderHistory() {
    var h=""; for(var i=sessionLog.length-1; i>=0; i--){
      var r=sessionLog[i]; var hw=r.details.some(d=>!d.correct); var hc=r.details.some(d=>d.correct);
      h+=`<tr><td>${r.n}</td><td style="font-size:0.8em">${r.d}<br>${r.t}</td><td>${r.s}</td><td>${hw?`<button class="btn-view-wrong" onclick="viewDetails(${i},'wrong')">錯題</button>`:`<span class="btn-disabled">無</span>`}</td><td>${hc?`<button class="btn-view-correct" onclick="viewDetails(${i},'correct')">正題</button>`:`<span class="btn-disabled">無</span>`}</td></tr>`;
    } el('history-body').innerHTML=h;
  }
  var supers={'0':'⁰','1':'¹','2':'²','3':'³','4':'⁴','5':'⁵','6':'⁶','7':'⁷','8':'⁸','9':'⁹'};
  function kp(k){ if(currInput.length>20)return; if(/[0-9]/.test(k)&&currInput.slice(-1)==='^')currInput=currInput.slice(0,-1)+supers[k]; else currInput+=k; el('input-val').innerText=currInput; }
  function del(){ currInput=currInput.slice(0,-1); el('input-val').innerText=currInput; }
  function fmt(s){ return s.toString().trim().replace(/\s/g,'').toLowerCase().replace(/×/g,'x').replace(/÷/g,'/').replace(/⁰/g,'^0').replace(/¹/g,'^1').replace(/²/g,'^2').replace(/³/g,'^3').replace(/⁴/g,'^4').replace(/⁵/g,'^5'); }
  function checkAns() {
    if(currInput==="")return;
    var q=qList[currIdx]; q.myAns=currInput;
    var isRight=q.ans.some(a=>fmt(a)===fmt(currInput)); q.correct=isRight;
    var fb=el('q-feedback'); fb.style.display='block';
    if(isRight){ fb.innerHTML="✅ 答對！"; fb.className="feedback correct"; el('btn-teach').style.display='none'; }
    else { fb.innerHTML="❌ 答錯。 參考答案: \\("+q.displayAns+"\\)"; fb.className="feedback incorrect"; el('btn-teach').style.display='inline-block'; if(window.MathJax)MathJax.typesetPromise([fb]); }
    var sc=0; qList.forEach(i=>{if(i.correct)sc++;}); el('score-mini').innerText="得分: "+sc;
    el('btn-check').style.display='none'; el('btn-next').style.display='block'; el('btn-next').innerText=(currIdx===qList.length-1)?"查看結果":"下一題";
  }
  window.viewDetails=function(i,t){
    var r=sessionLog[i], l=[], tt="";
    if(t==='wrong'){l=r.details.filter(q=>!q.correct); tt="錯題檢討";}else{l=r.details.filter(q=>q.correct); tt="已答對題目";}
    el('modal-title').innerText=tt; var c="";
    if(l.length===0)c="<div style='text-align:center;padding:20px;'>無記錄</div>";
    else l.forEach(q=>{
      c+=`<div class="review-item ${t==='wrong'?'wrong-record':''}">
      <div class="review-q">${q.txt}</div>${q.img?'<div class="geo-image">'+q.img+'</div>':''}
      <div class="${t==='wrong'?'review-my-ans':'review-cor-ans'}">同學答案: ${q.myAns} ${t!=='wrong'?'(正確)':''}</div>
      <div class="review-cor-ans">參考答案: \\( ${q.displayAns} \\)</div>
      ${t==='wrong'?`<div style="margin-top:5px;background:#fffcf5;padding:8px;border:1px dashed #ccc;"><strong>解法：</strong><br>${q.steps}</div>`:''}
      </div>`;
    });
    el('modal-body-content').innerHTML=c; el('detail-modal').style.display='flex';
    if(window.MathJax)MathJax.typesetPromise([el('modal-body-content')]);
  };
  window.closeModal=function(){el('detail-modal').style.display='none';};
  window.initGame=function(m){
    el('result-view').style.display='none'; el('quiz-view').style.display='flex'; currIdx=0;
    qList=[]; if(m==='all')for(var i=1;i<=14;i++)qList.push(makeQ(i));
    else{if(wrongIds.length===0)wrongIds=[1]; for(var j=0;j<wrongIds.length;j++)qList.push(makeQ(wrongIds[j]));}
    el('score-mini').innerText="得分: 0"; showQ();
  }
  initGame('all');
} catch(e) { document.body.innerHTML="<h2 style='color:red'>"+e.message+"</h2>"; }
</script>
