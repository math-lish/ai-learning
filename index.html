<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zach's Math Class - 數學教學網站</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --primary: #FF6B35;
            --secondary: #4ECDC4;
            --accent: #FFE66D;
            --dark: #292F36;
            --s1-color: #FF6B6B;
            --s3-color: #4ECDC4;
            --s5-color: #95E1D3;
        }
        
        body {
            font-family: "PingFang HK", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #FFE66D 0%, #FF6B35 50%, #4ECDC4 100%);
            min-height: 100vh;
            color: var(--dark);
            padding: 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        
        /* Header */
        header {
            text-align: center;
            padding: 30px 20px;
            background: rgba(255,255,255,0.95);
            border-radius: 25px;
            margin-bottom: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
        }
        
        header h1 {
            font-size: 2.2em;
            margin-bottom: 5px;
        }
        
        header h1 span {
            color: #FF6B35;
        }
        
        header p {
            font-size: 1.1em;
            color: #666;
        }
        
        /* Grade Selection */
        .grade-section {
            margin-bottom: 25px;
        }
        
        .section-title {
            text-align: center;
            color: white;
            font-size: 1.3em;
            margin-bottom: 15px;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.2);
        }
        
        .grade-cards {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        
        .grade-card {
            background: white;
            border-radius: 20px;
            padding: 30px 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            border: 3px solid transparent;
            text-decoration: none;
            color: var(--dark);
            min-width: 150px;
        }
        
        .grade-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent);
        }
        
        .grade-card .grade-num {
            font-size: 2.5em;
            font-weight: bold;
        }
        
        .grade-card.s1 { color: var(--s1-color); }
        .grade-card.s3 { color: var(--s3-color); }
        .grade-card.s5 { color: #9b59b6; }
        
        /* Chapters Grid */
        .chapters-section {
            display: none;
            background: rgba(255,255,255,0.98);
            border-radius: 25px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
            margin-bottom: 25px;
            animation: slideUp 0.4s ease-out;
        }
        
        .chapters-section.active {
            display: block;
        }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .back-btn {
            display: inline-block;
            padding: 8px 16px;
            background: #f0f0f0;
            border-radius: 20px;
            color: #666;
            text-decoration: none;
            font-size: 0.9em;
            margin-bottom: 20px;
            cursor: pointer;
            border: none;
        }
        
        .back-btn:hover {
            background: #e0e0e0;
        }
        
        .chapters-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px;
        }
        
        .chapter-card {
            padding: 20px 15px;
            border-radius: 15px;
            text-align: center;
            text-decoration: none;
            color: white;
            transition: all 0.3s;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
        }
        
        .chapter-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.2);
        }
        
        .chapter-card .ch-num {
            font-size: 1.8em;
            font-weight: bold;
        }
        
        .chapter-card .ch-name {
            font-size: 0.9em;
            margin-top: 5px;
        }
        
        /* Chapter Colors */
        .ch01 { background: linear-gradient(135deg, #FF6B6B, #c0392b); }
        .ch02 { background: linear-gradient(135deg, #f39c12, #e67e22); }
        .ch03 { background: linear-gradient(135deg, #9b59b6, #8e44ad); }
        .ch04 { background: linear-gradient(135deg, #3498db, #2980b9); }
        .ch05 { background: linear-gradient(135deg, #1abc9c, #16a085); }
        .ch06 { background: linear-gradient(135deg, #e74c3c, #c0392b); }
        .ch07 { background: linear-gradient(135deg, #f39c12, #d68910); }
        .ch08 { background: linear-gradient(135deg, #8e44ad, #7d3c98); }
        .ch09 { background: linear-gradient(135deg, #307e91, #287d8a); }
        .ch10 { background: linear-gradient(135deg, #2ecc71, #27ae60); }
        
        /* Footer */
        footer {
            text-align: center;
            padding: 20px;
            color: rgba(255,255,255,0.9);
            font-size: 0.9em;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
        }
        
        /* Responsive */
        @media (max-width: 600px) {
            header h1 { font-size: 1.8em; }
            .grade-cards { flex-direction: column; align-items: center; }
            .chapters-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎓 <span>Zach's</span> Math Class</h1>
            <p>中一、中三、中五 數學專門班</p>
        </header>
        
        <!-- 年級選擇 -->
        <div class="grade-section">
            <p class="section-title">你想讀邊個年級？</p>
            <div class="grade-cards">
                <a href="#" class="grade-card s1" onclick="showChapters('s1')">
                    <div class="grade-num">中一</div>
                    <div>S1</div>
                </a>
                <a href="#" class="grade-card s3" onclick="showChapters('s3')">
                    <div class="grade-num">中三</div>
                    <div>S3</div>
                </a>
                <a href="#" class="grade-card s5" onclick="showChapters('s5')">
                    <div class="grade-num">中五</div>
                    <div>S5</div>
                </a>
            </div>
        </div>
        
        <!-- S1 課題 -->
        <div id="s1-chapters" class="chapters-section">
            <button class="back-btn" onclick="goBack()">← 返回</button>
            <h2 style="margin-bottom: 20px;">📗 中一數學 - 選擇課題</h2>
            <div class="chapters-grid">
                <a href="tutor/s1/ch01_basic_operations/index.html" class="chapter-card ch01">
                    <div class="ch-num">Ch1</div>
                    <div class="ch-name">基礎運算</div>
                </a>
                <a href="tutor/s1/ch02_directed_numbers/index.html" class="chapter-card ch02">
                    <div class="ch-num">Ch2</div>
                    <div class="ch-name">有向數</div>
                </a>
                <a href="tutor/s1/ch03_algebraic_expressions/index.html" class="chapter-card ch03">
                    <div class="ch-num">Ch3</div>
                    <div class="ch-name">代數式</div>
                </a>
                <a href="tutor/s1/ch04_linear_equations/index.html" class="chapter-card ch04">
                    <div class="ch-num">Ch4</div>
                    <div class="ch-name">方程</div>
                </a>
                <a href="tutor/s1/ch05_area_volume/index.html" class="chapter-card ch05">
                    <div class="ch-num">Ch5</div>
                    <div class="ch-name">面積與體積</div>
                </a>
                <a href="tutor/s1/ch06_ratio_percentage/index.html" class="chapter-card ch06">
                    <div class="ch-num">Ch6</div>
                    <div class="ch-name">百分法</div>
                </a>
                <a href="tutor/s1/ch07_polynomials/index.html" class="chapter-card ch07">
                    <div class="ch-num">Ch7</div>
                    <div class="ch-name">多項式</div>
                </a>
                <a href="tutor/s1/ch08_quadrilaterals/index.html" class="chapter-card ch08">
                    <div class="ch-num">Ch8</div>
                    <div class="ch-name">四邊形</div>
                </a>
                <a href="tutor/s1/ch09_congruence_similarity/index.html" class="chapter-card ch09">
                    <div class="ch-num">Ch9</div>
                    <div class="ch-name">全等與相似</div>
                </a>
                <a href="tutor/s1/ch10_coordinates/index.html" class="chapter-card ch10">
                    <div class="ch-num">Ch10</div>
                    <div class="ch-name">坐標幾何</div>
                </a>
            </div>
        </div>
        
        <!-- S3 課題 -->
        <div id="s3-chapters" class="chapters-section">
            <button class="back-btn" onclick="goBack()">← 返回</button>
            <h2 style="margin-bottom: 20px;">📙 中三數學 - 選擇課題</h2>
            <p style="color: #666;">中三課題即將推出...</p>
        </div>
        
        <!-- S5 課題 -->
        <div id="s5-chapters" class="chapters-section">
            <button class="back-btn" onclick="goBack()">← 返回</button>
            <h2 style="margin-bottom: 20px;">📕 中五數學 - 選擇課題</h2>
            <p style="color: #666;">中五課題即將推出...</p>
        </div>
        
        <footer>
            <p>📧 zach@school.edu.hk | 🎓 Zach's Math Class</p>
        </footer>
    </div>
    
    <script>
        function showChapters(grade) {
            document.getElementById(grade + '-chapters').classList.add('active');
            window.scrollTo({ top: 200, behavior: 'smooth' });
        }
        
        function goBack() {
            document.querySelectorAll('.chapters-section').forEach(s => s.classList.remove('active'));
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>
</html>
